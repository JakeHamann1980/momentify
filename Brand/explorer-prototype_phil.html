<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentify Explorer Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── Password Gate ─────────────────────── */
  #password-gate {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
  }
  #password-gate.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .pw-box {
    text-align: center;
    max-width: 360px;
    width: 100%;
    padding: 0 24px;
  }

  .pw-logo {
    margin-bottom: 32px;
  }

  .pw-label {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .pw-input-row {
    display: flex;
    gap: 8px;
  }

  .pw-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .pw-input:focus {
    border-color: #F16A21;
  }
  .pw-input.error {
    border-color: #E5484D;
    animation: shake 0.4s ease;
  }

  .pw-submit {
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid #F16A21;
    background: transparent;
    color: #F16A21;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .pw-submit:hover {
    background: #F16A21;
    color: #fff;
  }

  .pw-error-msg {
    font-size: 12px;
    color: #E5484D;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .pw-error-msg.visible { opacity: 1; }

  .pw-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    margin-top: 24px;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }

  /* ─── iPad Bezel ────────────────────────── */
  #ipad-wrapper {
    display: none;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
  }
  #ipad-wrapper.visible {
    display: flex;
  }

  .ipad-bezel {
    position: relative;
    width: 1446px;
    height: 1104px;
    background: #1a1a1a;
    border-radius: 36px;
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 20px 80px rgba(0,0,0,0.6),
      0 4px 20px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.06);
    padding: 40px;
    transform-origin: center center;
  }

  .ipad-screen {
    width: 1366px;
    height: 1024px;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
  }

  .ipad-screen iframe {
    width: 1366px;
    height: 1024px;
    border: none;
    display: block;
  }

  .ipad-camera {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2a2a2a;
    border: 1px solid rgba(255,255,255,0.06);
  }

  #ipad-wrapper {
    flex-direction: column;
    gap: 12px;
  }

  .powered-by {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.03em;
    white-space: nowrap;
    text-align: center;
    flex-shrink: 0;
  }
  .powered-by a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
  }
</style>
</head>
<body>

<!-- Password Gate -->
<div id="password-gate">
  <div class="pw-box">
    <div class="pw-logo">
      <img src="phil-logo.png" style="height:100px;width:auto;" />
    </div>
    <div class="pw-label">Enter password to continue</div>
    <div class="pw-input-row">
      <input type="password" class="pw-input" id="pw-input" placeholder="Password" autocomplete="off" autofocus>
      <button class="pw-submit" onclick="checkPassword()">Enter</button>
    </div>
    <div class="pw-error-msg" id="pw-error">Incorrect password. Please try again.</div>
  </div>
</div>

<!-- iPad Bezel -->
<div id="ipad-wrapper">
  <div class="ipad-bezel" id="ipad-bezel">
    <div class="ipad-camera"></div>
    <div class="ipad-screen">
      <iframe id="proto-frame" src="about:blank"></iframe>
    </div>
  </div>
  <div class="powered-by">Prototype preview &mdash; best viewed in landscape on desktop</div>
</div>

<script>
  const PASSWORD = 'philsystems';

  function checkPassword() {
    const input = document.getElementById('pw-input');
    const error = document.getElementById('pw-error');
    if (input.value === PASSWORD) {
      const gate = document.getElementById('password-gate');
      gate.classList.add('hidden');
      setTimeout(() => { gate.style.display = 'none'; }, 400);
      document.getElementById('ipad-wrapper').classList.add('visible');
      document.getElementById('proto-frame').src = 'explorer-prototype_phil_explorer.html';
      scaleBezel();
    } else {
      input.classList.add('error');
      error.classList.add('visible');
      setTimeout(() => { input.classList.remove('error'); }, 400);
      input.select();
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
    document.getElementById('pw-error').classList.remove('visible');
  });

  function scaleBezel() {
    const bezel = document.getElementById('ipad-bezel');
    if (!bezel) return;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const bw = 1446;
    const bh = 1104;
    const scaleX = (vw - 40) / bw;
    const scaleY = (vh - 70) / bh;
    const scale = Math.min(scaleX, scaleY, 1);
    bezel.style.transform = `scale(${scale})`;
  }

  window.addEventListener('resize', scaleBezel);
</script>
</body>
</html>
