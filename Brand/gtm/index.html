<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GTM | Momentify</title>
  <script>
    window.BRAND_SKIP_AUTH = true;
  </script>
  <script>
    (function(){var t=localStorage.getItem('mk-theme');if(t)document.documentElement.dataset.theme=t;})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../brand-nav.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .page-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }
    .page-title {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      transition: color var(--t);
    }
    .page-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--text-muted);
      transition: color var(--t);
    }
  </style>
</head>
<body>
  <script src="../brand-nav.js"></script>

  <div class="page-body">
    <h1 class="page-title">GTM</h1>
    <p class="page-subtitle">Go-to-market resources</p>
  </div>
</body>
</html>
