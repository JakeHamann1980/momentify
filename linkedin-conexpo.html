<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CONEXPO-CON/AGG — Momentify LinkedIn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 628px;
      overflow: hidden;
      background: #07081F;
    }

    .canvas {
      position: relative;
      width: 1200px;
      height: 628px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background ───────────────────────────────────────────── */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 720px 560px at -8% 65%, #2D0770 0%, transparent 68%),
        radial-gradient(ellipse 400px 340px at 105% 15%, #1A0E3C 0%, transparent 55%),
        radial-gradient(ellipse 500px 300px at 95% 90%, #0D0524 0%, transparent 65%),
        linear-gradient(155deg, #0B0B3C 0%, #07081F 50%, #050418 100%);
    }

    /* violet glow halo */
    .glow-violet {
      position: absolute;
      width: 600px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,33,212,0.22) 0%, transparent 70%);
      top: -160px;
      left: -120px;
    }
    /* cyan whisper bottom-right */
    .glow-cyan {
      position: absolute;
      width: 380px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(12,244,223,0.07) 0%, transparent 70%);
      bottom: -80px;
      right: 240px;
    }

    /* ── Geometric decoration (right panel) ────────────────────── */
    .deco-svg {
      position: absolute;
      top: 0;
      right: 0;
      width: 540px;
      height: 628px;
      pointer-events: none;
    }

    /* ── Divider rule ───────────────────────────────────────────── */
    .rule {
      position: absolute;
      bottom: 100px;
      left: 80px;
      width: 580px;
      height: 1px;
      background: linear-gradient(
        90deg,
        rgba(12,244,223,0.3) 0%,
        rgba(107,33,212,0.18) 55%,
        transparent 100%
      );
    }

    /* ── Content ────────────────────────────────────────────────── */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding: 60px 80px 54px;
    }

    /* Event eyebrow chip */
    .event-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
      width: fit-content;
    }
    .chip-pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #0CF4DF;
      box-shadow: 0 0 8px rgba(12,244,223,0.6);
      flex-shrink: 0;
    }
    .chip-event {
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #0CF4DF;
    }
    .chip-sep {
      width: 1px;
      height: 14px;
      background: rgba(12,244,223,0.28);
    }
    .chip-loc {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }

    /* Main headline */
    .headline {
      font-size: 92px;
      font-weight: 800;
      letter-spacing: -0.035em;
      line-height: 0.92;
      color: #FFFFFF;
      margin-bottom: 30px;
      flex-shrink: 0;
    }
    .headline .grad {
      background: linear-gradient(135deg, #C4A3F0 0%, #9B5FE8 45%, #6B21D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Sub-copy */
    .subcopy {
      font-size: 19px;
      font-weight: 400;
      line-height: 1.6;
      color: rgba(255,255,255,0.5);
      max-width: 480px;
      flex: 1;
    }
    .subcopy strong {
      color: rgba(255,255,255,0.82);
      font-weight: 500;
    }

    /* Bottom bar */
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-top: 20px;
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .logo-block img {
      height: 30px;
      display: block;
    }
    .logo-sub {
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    /* Solution badge */
    .sol-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(107,33,212,0.18);
      border: 1px solid rgba(155,95,232,0.3);
      border-radius: 100px;
      padding: 9px 20px;
    }
    .sol-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #9B5FE8;
      box-shadow: 0 0 6px rgba(155,95,232,0.5);
    }
    .sol-label {
      font-size: 12px;
      font-weight: 600;
      color: #C4A3F0;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<div class="canvas">

  <!-- Background layers -->
  <div class="bg"></div>
  <div class="glow-violet"></div>
  <div class="glow-cyan"></div>

  <!-- Right-side geometric decoration -->
  <svg class="deco-svg" viewBox="0 0 540 628" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Primary angular panel -->
    <path d="M 340 -10 L 540 -10 L 540 628 L 140 628 L 310 400 L 200 195 Z"
          fill="rgba(107,33,212,0.07)"
          stroke="rgba(155,95,232,0.1)" stroke-width="1"/>

    <!-- Secondary inner facet -->
    <path d="M 390 60 L 540 60 L 540 540 L 240 540 L 385 330 L 290 165 Z"
          fill="rgba(155,95,232,0.04)"
          stroke="rgba(196,163,240,0.07)" stroke-width="1"/>

    <!-- Diagonal accent lines -->
    <line x1="540" y1="0"   x2="140" y2="628" stroke="rgba(12,244,223,0.05)"  stroke-width="1"/>
    <line x1="540" y1="120" x2="280" y2="628" stroke="rgba(107,33,212,0.08)" stroke-width="1"/>
    <line x1="540" y1="240" x2="400" y2="628" stroke="rgba(155,95,232,0.06)" stroke-width="1"/>

    <!-- Accent dot cluster — top right -->
    <circle cx="474" cy="92"  r="3"   fill="rgba(12,244,223,0.5)"/>
    <circle cx="504" cy="68"  r="2"   fill="rgba(12,244,223,0.28)"/>
    <circle cx="450" cy="118" r="1.5" fill="rgba(155,95,232,0.55)"/>
    <circle cx="488" cy="140" r="2"   fill="rgba(155,95,232,0.3)"/>

    <!-- Dot grid — mid panel -->
    <circle cx="360" cy="210" r="1.5" fill="rgba(255,255,255,0.12)"/>
    <circle cx="380" cy="210" r="1.5" fill="rgba(255,255,255,0.12)"/>
    <circle cx="400" cy="210" r="1.5" fill="rgba(255,255,255,0.12)"/>
    <circle cx="420" cy="210" r="1.5" fill="rgba(255,255,255,0.07)"/>
    <circle cx="360" cy="228" r="1.5" fill="rgba(255,255,255,0.09)"/>
    <circle cx="380" cy="228" r="1.5" fill="rgba(255,255,255,0.09)"/>
    <circle cx="400" cy="228" r="1.5" fill="rgba(255,255,255,0.09)"/>
    <circle cx="360" cy="246" r="1.5" fill="rgba(255,255,255,0.06)"/>
    <circle cx="380" cy="246" r="1.5" fill="rgba(255,255,255,0.06)"/>

    <!-- Scan / signal bars — trade show data metaphor -->
    <rect x="320" y="306" width="170" height="2" rx="1" fill="rgba(12,244,223,0.18)"/>
    <rect x="320" y="316" width="118" height="1.5" rx="1" fill="rgba(12,244,223,0.1)"/>
    <rect x="320" y="325" width="144" height="1.5" rx="1" fill="rgba(12,244,223,0.1)"/>
    <rect x="320" y="334" width="88"  height="1.5" rx="1" fill="rgba(12,244,223,0.07)"/>
    <rect x="320" y="343" width="160" height="1.5" rx="1" fill="rgba(12,244,223,0.07)"/>

    <!-- Signal label -->
    <text x="320" y="295" font-family="Inter,sans-serif" font-size="9"
          font-weight="600" letter-spacing="0.14em" fill="rgba(12,244,223,0.3)"
          text-transform="uppercase">FLOOR ACTIVITY</text>

    <!-- Corner bracket — bottom right -->
    <path d="M 500 568 L 520 568 L 520 548" stroke="rgba(155,95,232,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 360 568 L 340 568 L 340 548" stroke="rgba(155,95,232,0.2)"  stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </svg>

  <!-- Horizontal rule -->
  <div class="rule"></div>

  <!-- Main content -->
  <div class="content">

    <!-- Event eyebrow -->
    <div class="event-chip">
      <div class="chip-pulse"></div>
      <span class="chip-event">CONEXPO-CON/AGG</span>
      <div class="chip-sep"></div>
      <span class="chip-loc">Las Vegas</span>
    </div>

    <!-- Headline -->
    <div class="headline">
      Measure<br/><span class="grad">the Moment.</span>
    </div>

    <!-- Supporting copy -->
    <p class="subcopy">
      Beyond badge scans.<br/>
      <strong>Real floor intelligence.</strong>
    </p>

    <!-- Bottom row -->
    <div class="bottom">
      <div class="logo-block">
        <img src="assets/Momentify-Logo_Reverse.svg" alt="Momentify" />
        <div class="logo-sub">momentifyapp.com</div>
      </div>
      <div class="sol-badge">
        <div class="sol-dot"></div>
        <span class="sol-label">Trade Shows &amp; Exhibits</span>
      </div>
    </div>

  </div>

</div>
</body>
</html>
